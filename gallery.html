<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoMA MoMENT — Your Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "MoMA Sans";
      src: url("https://db.onlinewebfonts.com/t/211be15f3b79857b52ec64538f6032a2.woff2") format("woff2"),
           url("https://db.onlinewebfonts.com/t/211be15f3b79857b52ec64538f6032a2.woff") format("woff"),
           url("https://db.onlinewebfonts.com/t/211be15f3b79857b52ec64538f6032a2.ttf") format("truetype");
      font-weight: 600;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EFEFEF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      overflow: hidden;
    }

    /* ── Scene ── */
    #scene {
      perspective: 2800px;
      perspective-origin: 50% 48%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Book ── */
    #book {
      position: relative;
      width: 900px;
      height: 560px;
      transform-style: preserve-3d;
    }
    #book::after {
      content: '';
      position: absolute;
      bottom: -22px;
      left: 6%; right: 6%;
      height: 22px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.18) 0%, transparent 75%);
      filter: blur(8px);
      pointer-events: none;
    }

    /* ── Book halves ── */
    .book-half {
      position: absolute;
      top: 0;
      width: 450px;
      height: 100%;
      overflow: hidden;
    }
    #book-left  { left: 0;  border-radius: 2px 0 0 2px; box-shadow: -2px 0 12px rgba(0,0,0,0.08), inset -4px 0 10px rgba(0,0,0,0.04); }
    #book-right { right: 0; border-radius: 0 2px 2px 0; box-shadow:  2px 0 12px rgba(0,0,0,0.08), inset  4px 0 10px rgba(0,0,0,0.04); }

    /* ── Spine ── */
    #spine {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 100%;
      background: #111111;
      z-index: 6;
      box-shadow: 0 0 18px rgba(0,0,0,0.3);
    }

    /* ── Page paper ── */
    .page-paper {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    .left-paper  { background: #FFFFFF; }
    .right-paper { background: #FFFFFF; }

    /* subtle inner shadow on right edge of left page */
    .left-paper::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; right: 0;
      width: 18px;
      background: linear-gradient(to left, rgba(0,0,0,0.04), transparent);
      pointer-events: none;
    }

    /* page number */
    .pg-num {
      position: absolute;
      bottom: 16px;
      font-size: 9px;
      color: #BBBBBB;
      letter-spacing: 0.12em;
      font-family: 'MoMA Sans', sans-serif;
    }
    .pg-num-l { left: 28px; }
    .pg-num-r { right: 28px; }

    /* ─────────────────────────────────────────
       LEFT PAGE — visit context
    ───────────────────────────────────────── */
    .left-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 6px;
      text-align: center;
      padding: 40px;
    }
    .lv-label {
      font-size: 8px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #AAAAAA;
    }
    .lv-num {
      font-family: 'MoMA Sans', sans-serif;
      font-size: 96px;
      color: #EEEEEE;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .lv-divider {
      width: 32px;
      height: 2px;
      background: #D4001A;
      margin: 8px 0;
    }
    .lv-painting {
      font-family: 'MoMA Sans', sans-serif;
      font-size: 12px;
      color: #555555;
      max-width: 200px;
      line-height: 1.4;
    }
    .lv-artist {
      font-size: 10px;
      color: #999999;
      font-style: italic;
    }

    /* title spread left page */
    .left-title-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      padding: 40px;
    }
    .lt-brand { font-family: 'MoMA Sans', sans-serif; font-size: 10px; letter-spacing: 0.38em; color: #D4001A; }
    .lt-title { font-family: 'MoMA Sans', sans-serif; font-size: 36px; color: #111111; letter-spacing: -0.02em; }
    .lt-line  { width: 36px; height: 2px; background: #111111; }
    .lt-name  { font-size: 11px; color: #888888; font-style: italic; }

    /* ─────────────────────────────────────────
       RIGHT PAGE — full diary entry
    ───────────────────────────────────────── */
    .right-body {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 20px 24px 32px;
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
    }

    /* ① top row: name, date, visit badge */
    .entry-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
      padding-bottom: 12px;
      border-bottom: 2px solid #111111;
    }
    .entry-name {
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #111111;
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .entry-top-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }
    .entry-date {
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 9px;
      color: #777777;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .entry-visit-badge {
      background: #D4001A;
      color: #fff;
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 7px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 8px;
      white-space: nowrap;
    }

    /* ② painting image */
    .entry-photo {
      width: 100%;
      height: 160px;
      overflow: hidden;
      background: #111111;
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    .entry-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .entry-no-photo {
      width: 100%;
      height: 170px;
      flex-shrink: 0;
      margin-bottom: 12px;
      background: #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'MoMA Sans', sans-serif;
      font-size: 22px;
      color: #CCCCCC;
      letter-spacing: 0.1em;
    }

    /* ③ question + moment */
    .entry-question {
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 7px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #D4001A;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .entry-moment {
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 13px;
      color: #222222;
      line-height: 1.55;
      flex: 1;
      overflow: hidden;
    }
    .entry-moment.empty { color: #CCCCCC; }

    /* ④ fun fact */
    .entry-fact {
      margin-top: 10px;
      padding: 8px 10px;
      background: #FFF5D6;
      flex-shrink: 0;
      border-left: 3px solid #F5C800;
    }
    .entry-fact-label {
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 7px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #997700;
      margin-bottom: 3px;
    }
    .entry-fact-text {
      font-family: 'MoMA Sans', 'Franklin Gothic Medium', sans-serif;
      font-size: 9.5px;
      color: #555522;
      line-height: 1.5;
    }

    /* outro / empty right page */
    .right-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      font-family: 'MoMA Sans', sans-serif;
    }
    .outro-brand { font-family: 'MoMA Sans', sans-serif; font-size: 9px; letter-spacing: 0.38em; color: #D4001A; }
    .outro-line  { width: 32px; height: 2px; background: #111111; }
    .outro-msg   { font-family: 'MoMA Sans', sans-serif; font-size: 11px; color: #888888; }
    .empty-title { font-family: 'MoMA Sans', sans-serif; font-size: 26px; color: #CCCCCC; letter-spacing: -0.02em; }
    .empty-sub   { font-family: 'MoMA Sans', sans-serif; font-size: 11px; color: #AAAAAA; text-align: center; max-width: 240px; line-height: 1.7; }

    /* ── Cover ── */
    #cover {
      position: absolute;
      right: 0; top: 0;
      width: 450px; height: 100%;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 1.15s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 10;
    }
    #cover.open { transform: rotateY(-180deg); }

    .cover-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    #cover-front {
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 44px 100px 44px 40px;
      overflow: hidden;
    }
    /* Bold red top bar */
    #cover-front::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: #D4001A;
      pointer-events: none;
    }

    .cover-eyebrow {
      margin-bottom: 14px;
    }
    .moma-logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #D4001A;
      padding: 5px 10px 4px;
      line-height: 1;
    }
    .moma-logo-box svg {
      display: block;
      height: 18px;
      width: auto;
    }
    .cover-title {
      font-family: 'MoMA Sans', sans-serif;
      font-size: 68px;
      color: #111111;
      letter-spacing: -0.03em;
      line-height: 0.9;
      margin-bottom: 4px;
    }
    .cover-sub {
      font-size: 10px;
      color: #999999;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .cover-rule {
      width: 100%;
      height: 1px;
      background: #DDDDDD;
      margin-bottom: 28px;
    }

    #loginForm {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    #loginForm input[type="email"] {
      background: #FFFFFF;
      border: 1.5px solid #DDDDDD;
      border-radius: 0;
      padding: 12px 14px;
      font-size: 13px;
      color: #111111;
      outline: none;
      font-family: system-ui, sans-serif;
      transition: border-color 0.2s;
      width: 100%;
    }
    #loginForm input[type="email"]::placeholder { color: #BBBBBB; }
    #loginForm input[type="email"]:focus { border-color: #111111; }
    #loginBtn {
      background: #D4001A;
      border: none;
      color: #FFFFFF;
      font-size: 10px;
      font-weight: 600;
      padding: 13px 20px;
      cursor: pointer;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'MoMA Sans', system-ui, sans-serif;
      transition: background 0.15s;
      width: 100%;
    }
    #loginBtn:hover:not(:disabled) { background: #AA0014; }
    #loginBtn:disabled { opacity: 0.45; cursor: default; }
    #cover-error {
      font-size: 11px;
      color: #D4001A;
      min-height: 14px;
      margin-top: 2px;
    }

    /* Cover decorative right strip */
    .cover-strip {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 48px;
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cover-strip-text {
      font-family: 'MoMA Sans', sans-serif;
      font-size: 8px;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* Cover corners removed */
    .cover-corner { display: none; }

    #cover-back {
      background: #111111;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #cover-back-logo {
      opacity: 0.12;
    }
    #cover-back-title {
      font-family: 'MoMA Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.12);
    }

    /* ── Flip page ── */
    #flip-page {
      position: absolute;
      top: 0;
      height: 100%;
      width: 450px;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 8;
      pointer-events: none;
      opacity: 0;
    }
    #flip-page.visible { opacity: 1; }
    #flip-page.on-right { right: 0; left: auto; transform-origin: left center; }
    #flip-page.on-left  { left: 0; right: auto; transform-origin: right center; }
    #flip-page.flipping-fwd { transform: rotateY(-180deg); }
    #flip-page.flipping-bwd { transform: rotateY(180deg); }

    .flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    #flip-back { transform: rotateY(180deg); }

    /* ── Nav ── */
    #book-nav { display: none; align-items: center; gap: 20px; }
    #book-nav.visible { display: flex; }

    .nav-btn {
      background: #111111;
      border: none;
      color: #FFFFFF;
      width: 38px; height: 38px;
      border-radius: 0;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: #D4001A; }
    .nav-btn:disabled { background: #DDDDDD; color: #AAAAAA; cursor: default; }

    #nav-info {
      font-size: 10px;
      color: #888888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      min-width: 130px;
      font-family: 'MoMA Sans', sans-serif;
    }

    .loading-text {
      font-size: 11px;
      color: #AAAAAA;
      font-style: italic;
      letter-spacing: 0.12em;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4 } 50% { opacity: 1 } }
  </style>
</head>
<body>

<div id="scene">
  <div id="book">
    <div id="spine"></div>

    <!-- Static left page -->
    <div class="book-half" id="book-left">
      <div id="left-content" class="page-paper left-paper" style="width:100%;height:100%;position:relative;"></div>
    </div>

    <!-- Static right page -->
    <div class="book-half" id="book-right">
      <div id="right-content" class="page-paper right-paper" style="width:100%;height:100%;position:relative;"></div>
    </div>

    <!-- Flip page (animated) -->
    <div id="flip-page" class="on-right">
      <div class="flip-face" id="flip-front"></div>
      <div class="flip-face" id="flip-back"></div>
    </div>

    <!-- Cover -->
    <div id="cover">
      <div class="cover-face" id="cover-front">
        <div class="cover-strip">
          <span class="cover-strip-text">Museum of Modern Art</span>
        </div>
        <div class="cover-eyebrow">
          <div class="moma-logo-box">
            <svg viewBox="0 0 120 28" xmlns="http://www.w3.org/2000/svg" aria-label="MoMA">
              <text x="0" y="22" font-family="Franklin Gothic Medium, Arial Black, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" letter-spacing="1">MoMA</text>
            </svg>
          </div>
        </div>
        <div class="cover-title">MoMENT</div>
        <div class="cover-sub">your museum diary</div>
        <div class="cover-rule"></div>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email" />
          <button type="submit" id="loginBtn">open your gallery</button>
          <div id="cover-error"></div>
        </form>
      </div>
      <div class="cover-face" id="cover-back">
        <div id="cover-back-logo">
          <div class="moma-logo-box">
            <svg viewBox="0 0 120 28" xmlns="http://www.w3.org/2000/svg" aria-label="MoMA">
              <text x="0" y="22" font-family="Franklin Gothic Medium, Arial Black, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" letter-spacing="1">MoMA</text>
            </svg>
          </div>
        </div>
        <div id="cover-back-title">MoMENT</div>
      </div>
    </div>
  </div>

  <div id="book-nav">
    <button class="nav-btn" id="prevBtn" disabled>&#8592;</button>
    <div id="nav-info"></div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL      = 'https://eabaoxpoplpngczpuhps.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhYmFveHBvcGxwbmdjenB1aHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzAwMzEsImV4cCI6MjA5MDIwNjAzMX0.8UdSHdU3dbsfTeDRncfqY6C0do9nUuyDil9SvSj4MNg';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const cover       = document.getElementById('cover');
  const loginForm   = document.getElementById('loginForm');
  const loginEmail  = document.getElementById('loginEmail');
  const loginBtn    = document.getElementById('loginBtn');
  const coverError  = document.getElementById('cover-error');
  const leftContent = document.getElementById('left-content');
  const rightContent= document.getElementById('right-content');
  const flipPage    = document.getElementById('flip-page');
  const flipFront   = document.getElementById('flip-front');
  const flipBack    = document.getElementById('flip-back');
  const bookNav     = document.getElementById('book-nav');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const navInfo     = document.getElementById('nav-info');

  let moments     = [];
  let pageIndex   = 0;   // one entry per page
  let isAnimating = false;
  let visitorName = '';

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function ordinal(n) {
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  const ARTIST_FACTS = {
    'van gogh': 'Van Gogh created over 2,100 artworks in just 10 years — roughly one piece every two days. He only sold one painting during his lifetime.',
    'monet':    'Monet painted his Water Lilies series almost blind, relying on memory and the labels on his paint tubes to identify colors.',
    'picasso':  'Picasso could draw before he could walk. His first word was "piz" — short for lápiz, the Spanish word for pencil.',
    'matisse':  'When arthritis made it too painful to paint, Matisse switched to cutting colored paper — and created some of his most beloved works.',
    'warhol':   'Warhol kept a "time capsule" practice, sealing everyday objects and mail in boxes. He filled over 600 boxes by the time he died.',
    'klimt':    'Klimt was so private he never allowed his own portrait to be painted and left almost no personal writings behind.',
    'kandinsky':'Kandinsky experienced synesthesia — he could "hear" colors and "see" sounds, directly inspiring his abstract style.',
    'pollock':  'Pollock laid his canvases on the floor and dripped paint from above, believing gravity was as much the artist as he was.',
    'dali':     'Dalí claimed his melting clocks were inspired by watching Camembert cheese melt in the sun on a hot afternoon.',
    'kahlo':    'Kahlo began painting seriously during a long recovery from a near-fatal bus accident at age 18, using a mirror mounted above her bed.',
  };

  function getArtistFact(artist) {
    if (!artist) return null;
    const key = artist.toLowerCase();
    for (const [name, fact] of Object.entries(ARTIST_FACTS)) {
      if (key.includes(name)) return fact;
    }
    return null;
  }

  // Build a single diary entry page (works for both left and right halves)
  // buildEntry returns inner HTML only — the .page-paper wrapper is already on #left-content / #right-content
  function buildEntry(m, vn, pgNum, pgNumClass) {
    if (!m) {
      return `
        <div class="right-center">
          <div class="outro-brand">MoMA MoMENT</div>
          <div class="outro-line"></div>
          <div class="outro-msg">every visit, a new story.</div>
        </div>`;
    }

    const photoHtml = m.image_data
      ? `<div class="entry-photo"><img src="${m.image_data}" alt="your painting" loading="lazy"/></div>`
      : `<div class="entry-no-photo">MoMENT</div>`;

    const momentHtml = m.moment_text
      ? `<div class="entry-moment">"${m.moment_text}"</div>`
      : `<div class="entry-moment empty">—</div>`;

    const fact = getArtistFact(m.painting_artist);
    const factHtml = fact
      ? `<div class="entry-fact">
           <div class="entry-fact-label">did you know · ${m.painting_artist || 'the artist'}</div>
           <div class="entry-fact-text">${fact}</div>
         </div>`
      : '';

    return `
      <div class="right-body">
        <div class="entry-top">
          <div class="entry-name">${m.visitor_name || 'Anonymous'}</div>
          <div class="entry-top-right">
            <div class="entry-date">${formatDate(m.created_at)}</div>
            <div class="entry-visit-badge">${ordinal(vn)} visit</div>
          </div>
        </div>
        ${photoHtml}
        <div class="entry-question">What's your MoMA MoMENT today?</div>
        ${momentHtml}
        ${factHtml}
      </div>
      ${pgNum != null ? `<span class="pg-num ${pgNumClass}">${pgNum}</span>` : ''}`;
  }

  function buildTitleLeft(name) {
    return `
      <div class="left-title-body">
        <div class="lt-brand">MoMA</div>
        <div class="lt-title">MoMENT</div>
        <div class="lt-line"></div>
        <div class="lt-name">${name}'s gallery</div>
      </div>`;
  }

  function buildEmptyRight() {
    return `
      <div class="right-center">
        <div class="empty-title">no moments yet</div>
        <div class="empty-sub">Visit a MoMA kiosk and create your first painting to get started.</div>
      </div>`;
  }

  // Single entry per page: left = title, right = moments[pageIndex]

  function renderPage(idx) {
    leftContent.className  = 'page-paper left-paper';
    rightContent.className = 'page-paper right-paper';
    leftContent.innerHTML  = buildTitleLeft(visitorName);
    rightContent.innerHTML = moments.length > 0
      ? buildEntry(moments[idx], idx + 1, idx + 1, 'pg-num-r')
      : buildEmptyRight();
    updateNav();
  }

  function updateNav() {
    prevBtn.disabled = pageIndex <= 0;
    nextBtn.disabled = pageIndex >= moments.length - 1;
    navInfo.textContent = moments.length === 0
      ? 'no moments found'
      : `visit ${pageIndex + 1} of ${moments.length}`;
  }

  // ── Page flip ──
  function flipTo(nextIdx, dir) {
    if (isAnimating) return;
    isAnimating = true;

    if (dir === 'fwd') {
      // right page flips left; its back shows the next entry
      flipFront.className = 'flip-face page-paper right-paper';
      flipBack.className  = 'flip-face page-paper right-paper';
      flipFront.innerHTML = buildEntry(moments[pageIndex], pageIndex + 1, pageIndex + 1, 'pg-num-r');
      flipBack.innerHTML  = buildEntry(moments[nextIdx],  nextIdx + 1,   nextIdx + 1,   'pg-num-r');
      flipPage.className  = 'on-right visible';
      flipPage.style.transform = '';
      void flipPage.offsetWidth;
      flipPage.classList.add('flipping-fwd');
    } else {
      // left page flips right; its back shows the previous entry on the right
      flipFront.className = 'flip-face page-paper left-paper';
      flipBack.className  = 'flip-face page-paper right-paper';
      flipFront.innerHTML = buildTitleLeft(visitorName);
      flipBack.innerHTML  = buildEntry(moments[nextIdx], nextIdx + 1, nextIdx + 1, 'pg-num-r');
      flipPage.className  = 'on-left visible';
      flipPage.style.transform = 'rotateY(180deg)';
      void flipPage.offsetWidth;
      flipPage.classList.add('flipping-bwd');
    }

    flipPage.addEventListener('transitionend', function handler() {
      flipPage.removeEventListener('transitionend', handler);
      pageIndex = nextIdx;
      renderPage(pageIndex);
      flipPage.className = 'on-right';
      flipPage.style.transform = '';
      isAnimating = false;
    }, { once: true });
  }

  prevBtn.addEventListener('click', () => { if (!isAnimating && pageIndex > 0) flipTo(pageIndex - 1, 'bwd'); });
  nextBtn.addEventListener('click', () => { if (!isAnimating && pageIndex < moments.length - 1) flipTo(pageIndex + 1, 'fwd'); });

  // ── Login ──
  loginForm.addEventListener('submit', async e => {
    e.preventDefault();
    const email = loginEmail.value.trim();
    if (!email) return;

    coverError.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'opening…';

    const dataPromise = db.from('moments').select('*').eq('email', email.toLowerCase()).order('created_at', { ascending: true });

    cover.classList.add('open');

    const firstName = email.split('@')[0];
    leftContent.className  = 'page-paper left-paper';
    rightContent.className = 'page-paper right-paper';
    leftContent.innerHTML  = buildTitleLeft(firstName);
    rightContent.innerHTML = `
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
        <span class="loading-text">finding your moments…</span>
      </div>`;

    const { data, error } = await dataPromise;

    if (error) {
      cover.classList.remove('open');
      coverError.textContent = 'Could not load — please try again.';
      loginBtn.disabled = false;
      loginBtn.textContent = 'open your gallery';
      return;
    }

    moments     = data || [];
    visitorName = firstName;
    pageIndex   = 0;
    renderPage(0);
    bookNav.classList.add('visible');

    loginBtn.disabled = false;
    loginBtn.textContent = 'open your gallery';
  });
</script>
</body>
</html>
